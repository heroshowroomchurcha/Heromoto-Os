<!DOCTYPE html>
<html>
<head>
<style>
.top-actions { display: flex; gap: 7px; align-items: center; position: relative; }
.search { width: 34px; height: 34px; padding: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: .3s; background: rgba(255,255,255,0.9); z-index: 10; border: 1px solid #deddd6; border-radius: 9px; }
.search svg { width: 17px; height: 17px; flex-shrink: 0; min-width: 17px; }
.search input { display: block; width: 0; opacity: 0; transition: .3s; border: 0; padding: 0; margin: 0; }
.search:focus-within { width: calc(100vw - 34px); position: absolute; right: 0; justify-content: flex-start; padding: 0 11px; }
.search:focus-within input { width: 100%; opacity: 1; margin-left: 7px; }
</style>
</head>
<body>
<div class="top-actions">
  <label class="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="black" fill="none"/><path d="m20 20-4-4" stroke="black"/></svg>
    <input type="text" placeholder="Search..." />
  </label>
</div>
</body>
</html>
