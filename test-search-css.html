<!DOCTYPE html>
<html>
<head>
<style>
.top-actions { display: flex; gap: 7px; align-items: center; position: relative; }
.search { display: flex; align-items: center; gap: 7px; border: 1px solid #deddd6; border-radius: 9px; padding: 8px; color: #aaa; background: rgba(255,255,255,.9); width: 34px; overflow: hidden; transition: .3s; }
.search input { border: 0; outline: 0; background: transparent; display: block; width: 0; opacity: 0; transition: .3s; }
.search:focus-within { width: 250px; position: absolute; right: 0; }
.search:focus-within input { width: 100%; opacity: 1; }
</style>
</head>
<body>
<div class="top-actions">
  <label class="search">
    <span>🔍</span>
    <input type="text" placeholder="Search..." />
  </label>
  <button>Bell</button>
  <button>New sale</button>
</div>
</body>
</html>
